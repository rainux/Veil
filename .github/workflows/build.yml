name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install neovim
        run: brew install neovim

      - name: Build
        run: xcodebuild build -project Veil.xcodeproj -scheme Veil -destination 'platform=macOS' -configuration Release CODE_SIGNING_ALLOWED=NO ONLY_ACTIVE_ARCH=NO CLANG_ENABLE_CODE_COVERAGE=NO CLANG_COVERAGE_MAPPING=NO

      - name: Test
        run: xcodebuild test -project Veil.xcodeproj -scheme Veil -destination 'platform=macOS' -only-testing:VeilTests CODE_SIGNING_ALLOWED=NO

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build Release
        run: xcodebuild build -project Veil.xcodeproj -scheme Veil -destination 'platform=macOS' -configuration Release -derivedDataPath build CODE_SIGNING_ALLOWED=NO ONLY_ACTIVE_ARCH=NO CLANG_ENABLE_CODE_COVERAGE=NO CLANG_COVERAGE_MAPPING=NO

      - name: Package app
        run: |
          APP_PATH="build/Build/Products/Release/Veil.app"
          ditto -c -k --keepParent "$APP_PATH" Veil.zip

      - name: Extract tag annotation
        id: tag_msg
        run: |
          # Fetch the tag object explicitly to ensure annotation is available
          git fetch origin tag ${GITHUB_REF_NAME} --no-tags --force
          echo "body<<ENDOFBODY" >> $GITHUB_OUTPUT
          git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)' >> $GITHUB_OUTPUT
          echo "ENDOFBODY" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Veil.zip
          body: ${{ steps.tag_msg.outputs.body }}
